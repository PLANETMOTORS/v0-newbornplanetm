# SonarCloud Project Configuration
sonar.projectKey=PLANETMOTORS_v0-newbornplanetm
sonar.organization=planetmotors

# Project metadata
sonar.projectName=Planet Motors v0
sonar.projectVersion=0.3.0

# Source and test paths
sonar.sources=app,lib,components,hooks,middleware.ts
sonar.tests=e2e,__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Exclusions
sonar.exclusions=\
  **/*.config.ts,\
  **/*.config.js,\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/public/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/types/**,\
  qa-logs/**,\
  studio/**,\
  studio/static/**,\
  **/*-results.json,\
  **/sanity-readiness-results.json,\
  **/sanity-schema-test-results.json,\
  Planet-Ultra/**,\
  Website/**,\
  PLANET-WEB-FINAL/**,\
  next-platform-starter/**,\
  v0-cms-site-build-m1/**,\
  v0-planet-ultra-ui-ux-rebuild/**,\
  scripts/**,\
  supabase/**

# Coverage exclusions
# React components and pages are excluded from coverage measurement — they require
# browser/E2E tests (Playwright) for meaningful coverage, not node-env unit tests.
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.config.ts,\
  **/*.config.js,\
  e2e/**,\
  studio/**,\
  app/**,\
  components/**,\
  hooks/**,\
  lib/hooks/**,\
  lib/sanity/client.ts,\
  app/sw.ts,\
  scripts/**,\
  lib/crm/**,\
  lib/drivee-sync.ts,\
  lib/license-path.ts,\
  lib/meta-capi.ts,\
  lib/redact.ts,\
  lib/liveVideoTour/**,\
  lib/vehicle-data.ts,\
  lib/homenet/parser.ts,\
  lib/homenet/sftp-client.ts,\
  lib/homenet/sftp-export.ts,\
  lib/validation.ts,\
  lib/cms/backup.ts,\
  lib/supabase/middleware.ts,\
  lib/supabase/client.ts,\
  lib/supabase/server.ts,\
  lib/supabase/admin.ts,\
  lib/supabase/static.ts,\
  lib/supabase/edge-functions.ts,\
  lib/i18n/dictionaries.ts,\
  lib/vdp/**,\
  lib/env.ts,\
  lib/drivee-db.ts,\
  middleware.ts

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Duplication
# lib/blog-posts/** and lib/vehicle-data.ts are static data files (content/lookup tables).
# CPD is meaningless on them — their "duplication" is repeated HTML content and make/model
# entries, not copy-pasted logic. Excluding them from duplication analysis only.
# Repository files (lib/**/repository.ts) have inherently repetitive try/catch error handling —
# each Supabase query independently catches and wraps errors in Result<T,E>. This is by design.
sonar.cpd.exclusions=\
  **/types/**,\
  **/studio/schemas/**,\
  lib/blog-posts/**,\
  lib/vehicle-data.ts,\
  lib/blog-data.ts,\
  lib/protection-products.ts,\
  lib/vdp/fallback-vehicle-data.ts,\
  **/*-results.json,\
  **/sanity-readiness-results.json,\
  **/sanity-schema-test-results.json,\
  **/scripts/**,\
  components/ui/context-menu.tsx,\
  components/ui/dropdown-menu.tsx,\
  components/ui/menubar.tsx,\
  components/seo/json-ld.tsx,\
  app/careers/**,\
  lib/**/repository.ts,\
  lib/result.ts

# Issue suppressions
# search-autocomplete.tsx uses the WAI-ARIA combobox pattern which requires
# role="listbox" on the popup and role="option" on each item. These are NOT
# replaceable with native <select>/<option> per the ARIA Authoring Practices
# Guide (https://www.w3.org/WAI/ARIA/apg/patterns/combobox/).
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.e1.resourceKey=components/search-autocomplete.tsx

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Source encoding
sonar.sourceEncoding=UTF-8
