# SonarCloud Project Configuration
sonar.projectKey=PLANETMOTORS_v0-newbornplanetm
sonar.organization=planetmotors

# Project metadata
sonar.projectName=Planet Motors v0
sonar.projectVersion=0.3.0

# Source and test paths
sonar.sources=app,lib,components,studio,hooks,middleware.ts
sonar.tests=e2e,__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Exclusions
sonar.exclusions=**/*.config.ts,**/*.config.js,**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/public/**,**/coverage/**,**/*.d.ts,**/types/**,qa-logs/**,studio/static/**,**/*-results.json,**/sanity-readiness-results.json,**/sanity-schema-test-results.json

# Coverage exclusions
# Excludes: tests, specs, configs, e2e, studio, and specific React files
# that contain browser-only code (useEffect, JSX renders, window guards)
# which cannot be meaningfully unit-tested in a Node.js vitest environment.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.config.ts,**/*.config.js,e2e/**,studio/**,lib/hooks/**,app/account/page.tsx,components/finance-application-full-form.tsx,components/search-autocomplete.tsx

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Duplication
sonar.cpd.exclusions=**/types/**,**/studio/schemas/**,**/*-results.json,**/sanity-readiness-results.json,**/sanity-schema-test-results.json,**/scripts/**

# Source encoding
sonar.sourceEncoding=UTF-8
