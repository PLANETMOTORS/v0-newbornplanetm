# SonarCloud Project Configuration
sonar.projectKey=PLANETMOTORS_v0-newbornplanetm
sonar.organization=planetmotors

# Project metadata
sonar.projectName=Planet Motors v0
sonar.projectVersion=0.3.0

# Source and test paths
sonar.sources=app,lib,components,studio,hooks,middleware.ts
sonar.tests=e2e,__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Exclusions
sonar.exclusions=**/*.config.ts,**/*.config.js,**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/public/**,**/coverage/**,**/*.d.ts,**/types/**,qa-logs/**,studio/static/**

# Coverage exclusions
# React components and pages are excluded from coverage measurement — they require
# browser/E2E tests (Playwright) for meaningful coverage, not node-env unit tests.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.config.ts,**/*.config.js,e2e/**,studio/**,app/**,components/**,hooks/**

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Duplication
# lib/blog-posts/** and lib/vehicle-data.ts are static data files (content/lookup tables).
# CPD is meaningless on them — their "duplication" is repeated HTML content and make/model
# entries, not copy-pasted logic. Excluding them from duplication analysis only.
sonar.cpd.exclusions=**/types/**,**/studio/schemas/**,lib/blog-posts/**,lib/vehicle-data.ts,lib/blog-data.ts,lib/protection-products.ts,lib/vdp/fallback-vehicle-data.ts

# Source encoding
sonar.sourceEncoding=UTF-8
