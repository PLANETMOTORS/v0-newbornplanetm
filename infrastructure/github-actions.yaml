# .github/workflows/deploy-production.yml
# Planet Motors CI/CD Pipeline

name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run test:e2e

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .next
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

---
# 5. CI/CD PIPELINE

## Pipeline Stages

### 1. Code Quality (test job)
- Linting with ESLint
- Type checking with TypeScript
- Unit tests with Jest/Vitest
- E2E tests with Playwright

### 2. Build (build job)
- Next.js production build
- Image optimization
- Bundle analysis
- Artifact upload

### 3. Deploy (deploy job)
- Download build artifacts
- Deploy to Vercel
- Environment: production
- Automatic preview for PRs

### 4. Notify (notify job)
- Slack notification
- Always runs (success/failure)
- Includes commit details

## Environment Variables Required

| Variable | Description |
|----------|-------------|
| VERCEL_TOKEN | Vercel API token |
| VERCEL_ORG_ID | Vercel organization ID |
| VERCEL_PROJECT_ID | Vercel project ID |
| SLACK_WEBHOOK | Slack webhook URL |

## Branch Protection Rules

- Require pull request reviews
- Require status checks to pass
- Require branches to be up to date
- Include administrators

## Deployment Environments

| Environment | Branch | URL |
|-------------|--------|-----|
| Production | main | planetmotors.ca |
| Staging | develop | staging.planetmotors.ca |
| Preview | PR branches | pr-*.planetmotors.vercel.app |
