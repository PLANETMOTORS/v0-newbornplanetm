AWSTemplateFormatVersion: '2010-09-09'
Description: 'Planet Motors - CloudFront Distribution with imgix Origin for AVIF-optimized 360 Vehicle Images'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Deployment environment

  ImgixDomain:
    Type: String
    Default: images.planetmotors.com
    Description: imgix domain for vehicle images

  S3BucketName:
    Type: String
    Default: planetmotors-vehicle-images
    Description: S3 bucket containing original vehicle 360 spin images

  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for custom domain (must be in us-east-1)

  DomainName:
    Type: String
    Default: cdn.planetmotors.com
    Description: Custom domain name for CloudFront distribution

Resources:
  # S3 Bucket for original vehicle images
  VehicleImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - HEAD
            AllowedOrigins:
              - 'https://planetmotors.com'
              - 'https://*.planetmotors.com'
              - 'https://*.vercel.app'
            MaxAge: 3600
      # Enable versioning for object recovery and audit trail (S4423)
      VersioningConfiguration:
        Status: Enabled
      # Enable S3 server access logging — logs written to a dedicated prefix (S4423)
      LoggingConfiguration:
        DestinationBucketName: !Ref VehicleImagesBucket
        LogFilePrefix: access-logs/
      Tags:
        - Key: Project
          Value: PlanetMotors
        - Key: Environment
          Value: !Ref Environment

  # Bucket policy for CloudFront access
  VehicleImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VehicleImagesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${VehicleImagesBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # Origin Access Control for CloudFront
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${Environment}-planetmotors-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Cache Policy for AVIF-first delivery
  AVIFCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${Environment}-planetmotors-avif-cache'
        DefaultTTL: 86400  # 1 day
        MaxTTL: 31536000   # 1 year
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Accept  # For AVIF content negotiation
          QueryStringsConfig:
            QueryStringBehavior: whitelist
            QueryStrings:
              - w      # Width
              - h      # Height
              - q      # Quality
              - auto   # Auto format
              - fit    # Fit mode
              - fm     # Format

  # Response Headers Policy for CORS and caching
  ResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub '${Environment}-planetmotors-headers'
        CorsConfig:
          AccessControlAllowCredentials: false
          AccessControlAllowHeaders:
            Items:
              - '*'
          AccessControlAllowMethods:
            Items:
              - GET
              - HEAD
              - OPTIONS
          AccessControlAllowOrigins:
            Items:
              - 'https://planetmotors.com'
              - 'https://*.planetmotors.com'
              - 'https://*.vercel.app'
          AccessControlMaxAgeSec: 86400
          OriginOverride: true
        CustomHeadersConfig:
          Items:
            - Header: X-Content-Type-Options
              Value: nosniff
              Override: true
            - Header: X-Frame-Options
              Value: DENY
              Override: true
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
            Preload: true

  # CloudFront Function for AVIF content negotiation
  AVIFNegotiationFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${Environment}-avif-negotiation'
      AutoPublish: true
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var headers = request.headers;
          
          // Check if client supports AVIF via Accept header
          var acceptHeader = headers.accept ? headers.accept.value : '';
          var supportsAVIF = acceptHeader.includes('image/avif');
          
          // Add imgix auto-format parameter for AVIF-first delivery
          if (supportsAVIF) {
            // Append AVIF preference to query string
            var queryString = request.querystring;
            if (queryString.auto) {
              queryString.auto.value = 'format,compress';
            } else {
              queryString.auto = { value: 'format,compress' };
            }
            // Force AVIF format when supported
            queryString.fm = { value: 'avif' };
          }
          
          // Add Vary header hint for proper caching
          request.headers['x-avif-supported'] = { value: supportsAVIF ? 'true' : 'false' };
          
          return request;
        }
      FunctionConfig:
        Comment: 'AVIF content negotiation for vehicle 360 images'
        Runtime: cloudfront-js-2.0

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'Planet Motors Vehicle Images - ${Environment}'
        PriceClass: PriceClass_All
        HttpVersion: http2and3
        
        Aliases:
          - !Ref DomainName
        
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

        Origins:
          # imgix origin for image optimization
          - Id: imgix-origin
            DomainName: !Ref ImgixDomain
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
            OriginCustomHeaders:
              - HeaderName: X-Imgix-Source
                HeaderValue: planetmotors
          
          # S3 origin as fallback
          - Id: s3-origin
            DomainName: !GetAtt VehicleImagesBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id

        DefaultCacheBehavior:
          TargetOriginId: imgix-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: !Ref AVIFCachePolicy
          ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt AVIFNegotiationFunction.FunctionARN

        CacheBehaviors:
          # Vehicle 360 spin images path
          - PathPattern: '/vehicles/*/spin/*'
            TargetOriginId: imgix-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: !Ref AVIFCachePolicy
            ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt AVIFNegotiationFunction.FunctionARN
          
          # Static thumbnails path
          - PathPattern: '/vehicles/*/thumb/*'
            TargetOriginId: imgix-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: !Ref AVIFCachePolicy

        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /errors/404.html
            ErrorCachingMinTTL: 60
          - ErrorCode: 500
            ResponseCode: 500
            ResponsePagePath: /errors/500.html
            ErrorCachingMinTTL: 10

      Tags:
        - Key: Project
          Value: PlanetMotors
        - Key: Environment
          Value: !Ref Environment

Outputs:
  DistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${Environment}-PlanetMotors-DistributionId'

  DistributionDomainName:
    Description: CloudFront Distribution Domain Name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${Environment}-PlanetMotors-DistributionDomain'

  S3BucketArn:
    Description: S3 Bucket ARN for vehicle images
    Value: !GetAtt VehicleImagesBucket.Arn
    Export:
      Name: !Sub '${Environment}-PlanetMotors-BucketArn'

  ImageBaseUrl:
    Description: Base URL for vehicle images
    Value: !Sub 'https://${DomainName}'
    Export:
      Name: !Sub '${Environment}-PlanetMotors-ImageBaseUrl'
