apiVersion: v1alpha
kind: playwright
sauce:
  region: us-west-1
  concurrency: 5

playwright:
  version: "1.58.2"

rootDir: ./

suites:
  # Chrome on Windows
  - name: "Chrome Windows - Homepage & Navigation"
    platformName: "Windows 11"
    params:
      browserName: "chromium"
    testMatch:
      - "e2e/homepage.spec.ts"
      - "e2e/navigation.spec.ts"
    env:
      BASE_URL: "https://deploy-preview-241--planetnewborn-v0-newbornplanetm.netlify.app"

  - name: "Chrome Windows - Inventory & VDP"
    platformName: "Windows 11"
    params:
      browserName: "chromium"
    testMatch:
      - "e2e/inventory.spec.ts"
      - "e2e/vehicle-detail.spec.ts"
    env:
      BASE_URL: "https://deploy-preview-241--planetnewborn-v0-newbornplanetm.netlify.app"

  - name: "Chrome Windows - Contact & Forms"
    platformName: "Windows 11"
    params:
      browserName: "chromium"
    testMatch:
      - "e2e/contact.spec.ts"
    env:
      BASE_URL: "https://deploy-preview-241--planetnewborn-v0-newbornplanetm.netlify.app"

  # Firefox on Windows
  - name: "Firefox Windows - Homepage & Navigation"
    platformName: "Windows 11"
    params:
      browserName: "firefox"
    testMatch:
      - "e2e/homepage.spec.ts"
      - "e2e/navigation.spec.ts"
    env:
      BASE_URL: "https://deploy-preview-241--planetnewborn-v0-newbornplanetm.netlify.app"

  - name: "Firefox Windows - Inventory & VDP"
    platformName: "Windows 11"
    params:
      browserName: "firefox"
    testMatch:
      - "e2e/inventory.spec.ts"
      - "e2e/vehicle-detail.spec.ts"
    env:
      BASE_URL: "https://deploy-preview-241--planetnewborn-v0-newbornplanetm.netlify.app"

  # WebKit (Safari) on macOS
  - name: "Safari macOS - Homepage & Navigation"
    platformName: "macOS 13"
    params:
      browserName: "webkit"
    testMatch:
      - "e2e/homepage.spec.ts"
      - "e2e/navigation.spec.ts"
    env:
      BASE_URL: "https://deploy-preview-241--planetnewborn-v0-newbornplanetm.netlify.app"

  - name: "Safari macOS - Inventory & VDP"
    platformName: "macOS 13"
    params:
      browserName: "webkit"
    testMatch:
      - "e2e/inventory.spec.ts"
      - "e2e/vehicle-detail.spec.ts"
    env:
      BASE_URL: "https://deploy-preview-241--planetnewborn-v0-newbornplanetm.netlify.app"

  - name: "Safari macOS - Contact & Forms"
    platformName: "macOS 13"
    params:
      browserName: "webkit"
    testMatch:
      - "e2e/contact.spec.ts"
    env:
      BASE_URL: "https://deploy-preview-241--planetnewborn-v0-newbornplanetm.netlify.app"
