name: Sanity Data Integrity Audit

on:
  push:
    branches: [main]
  schedule:
    # Runs daily at 06:00 UTC (2:00 AM ET)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sanity-audit:
    name: Sanity Data Integrity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Sanity Data Integrity Check
        env:
          SANITY_PROJECT_ID: wlxj8olw
          SANITY_DATASET: production
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
        run: node scripts/sanity-check.cjs

      - name: Annotate failure
        if: failure()
        run: |
          echo "::error::Sanity data integrity check failed. Review the output above for broken references, missing required fields, or sync issues."
          echo "::notice::If all errors say 'project user not found', the SANITY_API_TOKEN secret is invalid or not a member of the configured Sanity project. Regenerate it at https://www.sanity.io/manage and update the secret in GitHub → Settings → Secrets → Actions."
